stages:
  - scan
  - report

variables:
  SNYK_TOKEN: "${SNYK_TOKEN}"
  GITLAB_TOKEN: "${CI_JOB_TOKEN}"

# SAST Scanning
sast:
  stage: scan
  image: returntocorp/semgrep
  script:
    - semgrep --config=p/security-audit --json -o sast-report.json . || true
  artifacts:
    reports:
      sast: sast-report.json
    paths:
      - sast-report.json
  allow_failure: true

# Dependency Scanning
dependency_scanning:
  stage: scan
  image: node:16
  before_script:
    - npm install -g snyk
    - snyk auth ${SNYK_TOKEN}
  script:
    - snyk test --json-file-output=snyk-report.json || true
    - snyk test --severity-threshold=low || true
  artifacts:
    paths:
      - snyk-report.json
    reports:
      dependency_scanning: snyk-report.json
  allow_failure: true

# Secret Detection
secret_detection:
  stage: scan
  image: node:16
  script:
    - npm install -g detect-secrets
    - detect-secrets scan --baseline .secrets.baseline || true
  allow_failure: true

# Container Scanning (if applicable)
container_scanning:
  stage: scan
  image: aquasec/trivy:latest
  script:
    - trivy image --severity HIGH,CRITICAL --format json -o container-scan.json node:16 || true
  artifacts:
    paths:
      - container-scan.json
  allow_failure: true

# Generate Report
generate_report:
  stage: report
  image: node:16
  script:
    - echo "Security Scan Report Generated"
    - echo "Total vulnerabilities detected across all scanners"
  dependencies:
    - sast
    - dependency_scanning
    - secret_detection
  allow_failure: true
